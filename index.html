<!DOCTYPE html>

<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width,initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --coral: #ff7f50;
            --mint: #e0f2f1;
            --pastel-pink: #fce4ec;
            --surface: #fce4ec;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--surface);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        h1,
        h2,
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .reveal-content {
            opacity: 0;
        }

        .reveal-content.animate {
            animation: bloom 1.8s cubic-bezier(0.2, 0, 0.2, 1) forwards;
        }

        @keyframes bloom {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            40% {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .floating-nav {
            opacity: 0;
        }

        .floating-nav.animate {
            animation: fadeIn 1s ease-out 0.4s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Loading Screen */
        .loader {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            background: linear-gradient(135deg, #fce4ec 0%, #ffe0e9 45%, #fff2e2 100%);
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .loader.loader-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-ring {
            position: relative;
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 4px solid rgba(255, 127, 80, 0.15);
            border-top-color: var(--coral);
            animation: loader-spin 0.9s linear infinite;
        }

        .loader-ring::after {
            content: '🎂';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            animation: loader-pulse 1.4s ease-in-out infinite;
        }

        @keyframes loader-spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes loader-pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }

        .loader-percent {
            font-family: 'Playfair Display', serif;
            color: var(--coral);
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            font-variant-numeric: tabular-nums;
        }

        .loader-bar {
            width: 160px;
            height: 5px;
            border-radius: 999px;
            background: rgba(255, 127, 80, 0.15);
            overflow: hidden;
        }

        .loader-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 999px;
            background: var(--coral);
            transition: width 0.15s linear;
        }

        .loader-text {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Playfair Display', serif;
            color: var(--coral);
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .loader-dots {
            display: flex;
            gap: 5px;
        }

        .loader-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--coral);
            animation: loader-dot-bounce 1.2s infinite ease-in-out;
        }

        .loader-dots span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .loader-dots span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes loader-dot-bounce {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .flower-deco {
            position: absolute;
            font-size: 2.75rem;
            color: var(--coral);
            filter: drop-shadow(0 6px 10px rgba(255, 127, 80, 0.35));
            animation: sway 4.5s linear infinite;
            z-index: 20;
        }

        .flower-deco.pink {
            color: #f48fb1;
        }

        @keyframes sway {
            0% {
                transform: rotate(0deg) translateY(0);
            }

            50% {
                transform: rotate(180deg) translateY(-12px);
            }

            100% {
                transform: rotate(360deg) translateY(0);
            }
        }

        .petal {
            position: fixed;
            top: -10vh;
            font-size: 1.4rem;
            opacity: 0.85;
            pointer-events: none;
            z-index: 5;
            animation: petal-fall linear infinite;
        }

        @keyframes petal-fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.9;
            }

            100% {
                transform: translateY(120vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <!-- Loading Screen -->
    <div class="loader" id="loader">
        <div class="loader-ring"></div>
        <div class="loader-percent" id="loader-percent">1%</div>
        <div class="loader-bar">
            <div class="loader-bar-fill" id="loader-bar-fill"></div>
        </div>
        <p class="loader-text">Menyiapkan kejutan
            <span class="loader-dots"><span></span><span></span><span></span></span>
        </p>
    </div>
    <!-- Fullscreen Shader Background -->
    <!-- STITCH_SHADER_START:ANIMATION_13 class="fixed inset-0 w-full h-full z-0" -->
    <div class="fixed inset-0 w-full h-full z-0" style="display:block;">
        <canvas id="shader-canvas-ANIMATION_13" style="display:block;width:100%;height:100%"></canvas>
        <script>
            (function () {
                const canvas = document.getElementById('shader-canvas-ANIMATION_13');

                // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
                // This fires on initial layout and whenever the element is resized.
                function syncSize() {
                    const w = canvas.clientWidth || 1280;
                    const h = canvas.clientHeight || 720;
                    if (canvas.width !== w || canvas.height !== h) {
                        canvas.width = w;
                        canvas.height = h;
                    }
                }
                if (typeof ResizeObserver !== 'undefined') {
                    new ResizeObserver(syncSize).observe(canvas);
                }
                syncSize();

                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) return;
                const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
                const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;

// Palette derived from Festive Jubilee: #ff7f50 (Coral), Pastel Pink, Mint
vec3 palette(float t) {
    vec3 a = vec3(0.988, 0.894, 0.925); // Surface (pink)
    vec3 b = vec3(1.0, 0.49, 0.31); // Coral #ff7f50
    vec3 c = vec3(0.9, 0.7, 0.9);   // Lilac
    vec3 d = vec3(0.8, 0.95, 0.9);  // Mint
    return a + b*cos(6.28318*(c*t+d));
}

float flower(vec2 uv, float petals, float size, float angle) {
    float r = length(uv);
    float a = atan(uv.y, uv.x) + angle;
    float f = cos(a * petals);
    return smoothstep(f, f+0.1, r/size);
}

void main() {
    vec2 uv = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / min(u_resolution.y, u_resolution.x);
    
    // Intro animation: opening from center
    float introTime = clamp(u_time * 0.5, 0.0, 1.0);
    float openingMask = smoothstep(0.0, 1.0, introTime);
    
    vec3 finalColor = vec3(0.988, 0.894, 0.925); // Background surface (pink)
    
    for(float i = 0.0; i < 4.0; i++) {
        vec2 uv2 = uv;
        float t = u_time * 0.2 + i * 0.5;
        
        // Dynamic movement
        uv2.x += sin(t + uv.y) * 0.2;
        uv2.y += cos(t + uv.x) * 0.2;
        
        // Scale out as if opening
        uv2 *= mix(5.0, 1.0, openingMask);
        
        float pet = 5.0 + i;
        float sz = 0.3 + 0.1 * sin(t);
        float ang = t * (0.5 + i*0.1);
        
        float d = flower(uv2, pet, sz, ang);
        vec3 col = palette(length(uv) + i*0.4 + u_time*0.1);
        
        finalColor = mix(col, finalColor, d);
    }

    // Vignette/Opening effect
    float dist = length(uv);
    float vignette = 1.0 - smoothstep(0.5, 1.5, dist * (1.0 - openingMask));
    
    gl_FragColor = vec4(finalColor * vignette, 1.0);
}`;
                function cs(type, src) {
                    const s = gl.createShader(type);
                    gl.shaderSource(s, src);
                    gl.compileShader(s);
                    return s;
                }
                const prog = gl.createProgram();
                gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
                gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
                gl.linkProgram(prog);
                gl.useProgram(prog);
                const buf = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, buf);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
                const pos = gl.getAttribLocation(prog, 'a_position');
                gl.enableVertexAttribArray(pos);
                gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
                const uTime = gl.getUniformLocation(prog, 'u_time');
                const uRes = gl.getUniformLocation(prog, 'u_resolution');
                const uMouse = gl.getUniformLocation(prog, 'u_mouse');

                // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
                // Shaders that need normalized coords should use: u_mouse / u_resolution.
                let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
                window.addEventListener('mousemove', (event) => {
                    const rect = canvas.getBoundingClientRect();
                    if (rect.width && rect.height) {
                        const nx = (event.clientX - rect.left) / rect.width;
                        const ny = 1.0 - (event.clientY - rect.top) / rect.height;
                        mouse.x = nx * canvas.width;
                        mouse.y = ny * canvas.height;
                    }
                });

                function render(t) {
                    if (typeof ResizeObserver === 'undefined') syncSize();
                    gl.viewport(0, 0, canvas.width, canvas.height);
                    if (uTime) gl.uniform1f(uTime, t * 0.001);
                    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
                    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
                    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                    requestAnimationFrame(render);
                }
                render(0);
            })();
        </script>
    </div>
    <!-- STITCH_SHADER_END:ANIMATION_13 -->
    <!-- Falling Petals -->
    <span class="petal" style="left: 8%; animation-duration: 9s; animation-delay: 0s;">🌸</span>
    <span class="petal" style="left: 22%; animation-duration: 11s; animation-delay: 2s;">🌸</span>
    <span class="petal" style="left: 40%; animation-duration: 8s; animation-delay: 4s;">🌺</span>
    <span class="petal" style="left: 58%; animation-duration: 12s; animation-delay: 1s;">🌸</span>
    <span class="petal" style="left: 75%; animation-duration: 10s; animation-delay: 3s;">🌺</span>
    <span class="petal" style="left: 90%; animation-duration: 9.5s; animation-delay: 5s;">🌸</span>
    <!-- Content Overlay -->
    <main class="relative z-10 w-full h-full flex flex-col items-center justify-center px-6">
        <div class="reveal-content flex flex-col items-center text-center">
            <h1 class="text-4xl md:text-5xl font-serif font-bold text-[#333] mb-2">
                Hai Yulia,
            </h1>
            <!-- Frame for the photo -->
            <div
                class="relative w-64 h-80 md:w-80 md:h-[420px] rounded-[40px] overflow-hidden border-8 border-white shadow-2xl mb-8 transform -rotate-2">
                <img alt="Birthday Celebration" class="w-full h-full object-cover" src="foto/f1.jpeg" />
                <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
                <svg class="flower-deco -left-8 top-8" fill="currentColor" viewBox="0 0 24 24" width="1em" height="1em">
                    <ellipse cx="12" cy="6" rx="3" ry="5" />
                    <ellipse cx="12" cy="6" rx="3" ry="5" transform="rotate(72 12 12)" />
                    <ellipse cx="12" cy="6" rx="3" ry="5" transform="rotate(144 12 12)" />
                    <ellipse cx="12" cy="6" rx="3" ry="5" transform="rotate(216 12 12)" />
                    <ellipse cx="12" cy="6" rx="3" ry="5" transform="rotate(288 12 12)" />
                    <circle cx="12" cy="12" r="3" fill="#fff59d" />
                </svg>
                <svg class="flower-deco pink -right-9 bottom-10" fill="currentColor" viewBox="0 0 24 24" width="1em"
                    height="1em" style="animation-delay: 1.5s;">
                    <ellipse cx="12" cy="6" rx="3" ry="5" />
                    <ellipse cx="12" cy="6" rx="3" ry="5" transform="rotate(72 12 12)" />
                    <ellipse cx="12" cy="6" rx="3" ry="5" transform="rotate(144 12 12)" />
                    <ellipse cx="12" cy="6" rx="3" ry="5" transform="rotate(216 12 12)" />
                    <ellipse cx="12" cy="6" rx="3" ry="5" transform="rotate(288 12 12)" />
                    <circle cx="12" cy="12" r="3" fill="#fff59d" />
                </svg>
            </div>
            <h1 class="text-4xl md:text-5xl font-serif font-bold text-[#333] mb-2">
                Selamat Ulang Tahun ya!
            </h1>
        </div>
    </main>
    <!-- Navigation Hints (Arrows/Dots instead of Bottom Nav) -->
    <div class="fixed bottom-12 left-0 right-0 z-20 flex flex-col items-center gap-6 floating-nav">
        <button class="flex flex-col items-center text-[#ff7f50] animate-bounce">
            <span class="text-xs font-semibold uppercase tracking-widest mb-1">Scroll</span>
            <svg class="text-3xl" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9" />
                <polyline points="6 4 12 10 18 4" />
            </svg>
        </button>
    </div>
    <!-- Simple Side Navigation Hint -->
    <div class="fixed right-4 top-1/2 -translate-y-1/2 z-20 hidden md:flex flex-col gap-4">
        <button
            class="w-10 h-10 rounded-full bg-white/80 backdrop-blur shadow-lg flex items-center justify-center text-[#ff7f50]">
            <span class="material-symbols-outlined">chevron_right</span>
        </button>
    </div>
    <script>
        (function () {
            var loader = document.getElementById('loader');
            var revealContent = document.querySelector('.reveal-content');
            var floatingNav = document.querySelector('.floating-nav');
            var percentEl = document.getElementById('loader-percent');
            var barFill = document.getElementById('loader-bar-fill');

            var pageLoad = new Promise(function (resolve) {
                if (document.readyState === 'complete') resolve();
                else window.addEventListener('load', resolve, { once: true });
            });

            // Counts 1 -> 100 at a deliberate pace (~3.5s total) instead of a flat timer.
            var totalDuration = 3500;
            var stepDelay = totalDuration / 100;
            var counting = new Promise(function (resolve) {
                var count = 0;
                function tick() {
                    count++;
                    percentEl.textContent = count + '%';
                    barFill.style.width = count + '%';
                    if (count < 100) {
                        setTimeout(tick, stepDelay);
                    } else {
                        resolve();
                    }
                }
                setTimeout(tick, stepDelay);
            });

            Promise.all([counting, pageLoad]).then(function () {
                loader.classList.add('loader-hidden');
                revealContent.classList.add('animate');
                floatingNav.classList.add('animate');
                setTimeout(function () { loader.remove(); }, 700);
            });
        })();
    </script>
    <script>
        (function () {
            var startY = null;
            var threshold = 50; // minimum px swipe distance
            var navigated = false;

            function goNext() {
                if (navigated) return;
                navigated = true;
                window.location.href = 'home2.html';
            }

            document.addEventListener('touchstart', function (e) {
                startY = e.touches[0].clientY;
            }, { passive: true });

            document.addEventListener('touchend', function (e) {
                if (startY === null) return;
                var endY = e.changedTouches[0].clientY;
                var deltaY = startY - endY;
                if (deltaY > threshold) {
                    goNext();
                }
                startY = null;
            }, { passive: true });
        })();
    </script>
</body>

</html>
